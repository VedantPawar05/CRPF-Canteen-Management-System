openapi: 3.0.3
info:
  title: ServeSmart API Gateway
  description: Microservices architecture API contract for the CRPF Canteen Management System.
  version: 1.0.0
servers:
  - url: http://localhost:4000/api/v1
    description: Local API Gateway

paths:
  /auth/login:
    post:
      summary: User Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string

  /menu:
    get:
      summary: Get all active menu items
      responses:
        '200':
          description: List of menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuItem'

  /orders:
    post:
      summary: Place a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      menuItemId:
                        type: string
                        format: uuid
                      quantity:
                        type: integer
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders/kitchen/live:
    get:
      summary: Get live orders for kitchen monitor
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of pending/preparing orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  schemas:
    MenuItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        isAvailable:
          type: boolean
          
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        totalAmount:
          type: number
        status:
          type: string
          enum: [Pending, Accepted, Preparing, Ready, Completed, Cancelled]
        createdAt:
          type: string
          format: date-time
