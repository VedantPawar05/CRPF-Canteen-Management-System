version: '3.8'

services:
  # ----------------------------------------------------
  # DATABASE (PostgreSQL)
  # ----------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: servesmart_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: servesmart
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d servesmart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------
  # CACHE / SESSION STORE (Redis)
  # ----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: servesmart_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  # ----------------------------------------------------
  # MESSAGE BROKER (RabbitMQ)
  # ----------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: servesmart_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  # ----------------------------------------------------
  # MONITORING (Prometheus + Grafana)
  # ----------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: servesmart_prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    # volumes:
    #  - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: servesmart_grafana
    ports:
      - "3005:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
